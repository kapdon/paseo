name: Deploy Relay

on:
  push:
    branches: [main]
    paths:
      - 'packages/relay/**'
      - '.github/workflows/deploy-relay.yml'
  workflow_dispatch:

jobs:
  deploy-gates:
    runs-on: ubuntu-latest
    outputs:
      has-cloudflare-token: ${{ steps.cloudflare.outputs.present }}

    steps:
      - name: Check Cloudflare credentials availability
        id: cloudflare
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [[ -n "$CLOUDFLARE_API_TOKEN" ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: [deploy-gates]
    if: ${{ needs.deploy-gates.outputs.has-cloudflare-token == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --workspace=@getpaseo/relay --include-workspace-root

      - name: Typecheck
        run: npm run typecheck --workspace=@getpaseo/relay

      - name: Deploy worker
        run: cd packages/relay && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
