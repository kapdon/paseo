name: Publish Docker Images

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publish-docker-images.yml"
      - "Dockerfile"
      - ".dockerignore"
      - ".env.docker.example"
      - "docker-compose.yml"
      - "docker/**"
      - "docs/DOCKER.md"
      - "package.json"
      - "package-lock.json"
      - "packages/app/**"
      - "packages/expo-two-way-audio/**"
      - "packages/highlight/**"
      - "packages/relay/**"
      - "packages/relay-self-hosted/**"
      - "packages/server/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/publish-docker-images.yml"
      - "Dockerfile"
      - ".dockerignore"
      - ".env.docker.example"
      - "docker-compose.yml"
      - "docker/**"
      - "docs/DOCKER.md"
      - "package.json"
      - "package-lock.json"
      - "packages/app/**"
      - "packages/expo-two-way-audio/**"
      - "packages/highlight/**"
      - "packages/relay/**"
      - "packages/relay-self-hosted/**"
      - "packages/server/**"
  workflow_dispatch:
    inputs:
      push_images:
        description: "Push images to GHCR"
        required: false
        default: true
        type: boolean

concurrency:
  group: docker-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: paseo-app
            target: app
          - image: paseo-server
            target: server
          - image: paseo-relay-self-hosted
            target: relay-self-hosted

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve publish mode
        id: publish_mode
        shell: bash
        run: |
          set -euo pipefail

          push="false"
          platforms="linux/amd64"

          if [[ "${{ github.event_name }}" == "push" ]]; then
            push="true"
            platforms="linux/amd64,linux/arm64"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.push_images }}" == "true" ]]; then
            push="true"
            platforms="linux/amd64,linux/arm64"
          fi

          echo "push=$push" >> "$GITHUB_OUTPUT"
          echo "platforms=$platforms" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: steps.publish_mode.outputs.push == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.publish_mode.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and optionally push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          platforms: ${{ steps.publish_mode.outputs.platforms }}
          push: ${{ steps.publish_mode.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: ${{ steps.publish_mode.outputs.push == 'true' }}
          sbom: ${{ steps.publish_mode.outputs.push == 'true' }}
